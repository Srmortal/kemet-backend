/firebase-admin/firestore/{collection}/{docId}:
  get:
    summary: Get Firestore document
    operationId: getFirestoreDocument
    security:
      - adminApiKey: []
    x-middleware:
      auth: true
      role: admin
    parameters:
      - name: collection
        in: path
        required: true
        schema:
          type: string
      - name: docId
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Document details
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/FirestoreDocument'
      '404':
        description: Document not found
  put:
    summary: Set Firestore document
    operationId: setFirestoreDocument
    security:
      - adminApiKey: []
    x-middleware:
      auth: true
      role: admin
    parameters:
      - name: collection
        in: path
        required: true
        schema:
          type: string
      - name: docId
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/index.yaml#/FirestoreSetRequest'
    responses:
      '200':
        description: Document set
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/FirestoreSetResponse'
      '400':
        description: Invalid request
  delete:
    summary: Delete Firestore document
    operationId: deleteFirestoreDocument
    security:
      - adminApiKey: []
    x-middleware:
      auth: true
      role: admin
    parameters:
      - name: collection
        in: path
        required: true
        schema:
          type: string
      - name: docId
        in: path
        required: true
        schema:
          type: string
    responses:
      '204':
        description: Document deleted
      '404':
        description: Document not found
/firebase-admin/firestore/{collection}/query:
  post:
    summary: Query Firestore collection
    operationId: queryFirestoreCollection
    security:
      - adminApiKey: []
    x-middleware:
      auth: true
      role: admin
    parameters:
      - name: collection
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/index.yaml#/FirestoreQueryRequest'
    responses:
      '200':
        description: Query results
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/index.yaml#/FirestoreDocument'