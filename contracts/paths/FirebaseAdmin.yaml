/firebase-admin/custom-token:
  post:
    summary: Create custom token for user
    operationId: createCustomToken
    security:
      - adminApiKey: []
    x-middleware:
      auth: true
      role: admin
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              uid:
                type: string
            required:
              - uid
    responses:
      '200':
        description: Custom token created
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required:
                - token
/firebase-admin/users/create:
  post:
    summary: Create a new user
    operationId: createUser
    security:
      - adminApiKey: []
    x-middleware:
      auth: true
      role: admin
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/index.yaml#/CreateUserRequest'
    responses:
      '201':
        description: User created
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/CreateUserResponse'
/firebase-admin/users:
  get:
    summary: List users
    operationId: listUsers
    security:
      - adminApiKey: []
    x-middleware:
      auth: true
      role: admin
    responses:
      '200':
        description: List of users
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/index.yaml#/User'
/firebase-admin/users/{uid}:
  get:
    summary: Get user by UID
    operationId: getUserByUid
    security:
      - adminApiKey: []
    x-middleware:
      auth: true
      role: admin
    parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: User details
        content:
          application/json:
            schema:
              type: object
              properties:
                uid:
                  type: string
                email:
                  type: string
              required:
                - uid
                - email
      '404':
        description: User not found
  patch:
    summary: Update user by UID
    operationId: updateUserByUid
    security:
      - adminApiKey: []
    x-middleware:
      auth: true
      role: admin
    parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              email:
                type: string
            required:
              - email
    responses:
      '200':
        description: User updated
        content:
          application/json:
            schema:
              type: object
              properties:
                uid:
                  type: string
              required:
                - uid
      '404':
        description: User not found
  delete:
    summary: Delete user by UID
    operationId: deleteUserByUid
    security:
      - adminApiKey: []
    x-middleware:
      auth: true
      role: admin
    parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
    responses:
      '204':
        description: User deleted
      '404':
        description: User not found
