/analytics/metrics:
  get:
    operationId: getAnalyticsMetrics
    summary: Get business analytics metrics
    description: Returns aggregated business metrics and reports from the PostgreSQL data source.
    tags:
      - Analytics
    parameters:
      - in: query
        name: startDate
        schema:
          type: string
          format: date
        required: false
        description: Start date for the analytics period (inclusive).
      - in: query
        name: endDate
        schema:
          type: string
          format: date
        required: false
        description: End date for the analytics period (inclusive).
    responses:
      '200':
        description: Analytics metrics successfully retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                metrics:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Name of the metric
                      value:
                        type: number
                        description: Value of the metric
                generatedAt:
                  type: string
                  format: date-time
                  description: Time the report was generated
              required:
                - metrics
                - generatedAt
      '400':
        description: Invalid query parameters
        content:
          application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: Error code
                  message:
                    type: string
                    description: Error message
                required:
                  - code
                  - message
      '500':
        description: Internal server error
        content:
          application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: Error code
                  message:
                    type: string
                    description: Error message
                required:
                  - code
                  - message

/analytics/events:
  post:
    operationId: postAnalyticsEvent
    summary: Trigger an analytics event
    description: Records a client event for analytics processing.
    tags:
      - Analytics
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              event_name:
                type: string
                description: Name of the event
              user_id:
                type: string
                description: User identifier (optional if anonymous)
              anonymous_id:
                type: string
                description: Anonymous identifier
              timestamp:
                type: string
                format: date-time
                description: Client event time (server may override)
              context:
                type: object
                properties:
                  platform:
                    type: string
                    description: ios | android | web
                  app_version:
                    type: string
                  os_version:
                    type: string
                  device_model:
                    type: string
                additionalProperties: false
              properties:
                type: object
                additionalProperties: true
            required:
              - event_name
    responses:
      '200':
        description: Event accepted
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
              required:
                - success
      '400':
        description: Invalid request
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: integer
                message:
                  type: string
              required:
                - code
                - message
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: integer
                message:
                  type: string
              required:
                - code
                - message
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: integer
                message:
                  type: string
              required:
                - code
                - message