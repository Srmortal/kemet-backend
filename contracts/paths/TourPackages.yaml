/tour-packages:
  get:
    summary: Get all tour packages
    operationId: getAllTourPackages
    security: []
    x-middleware:
      auth: false
    parameters:
      - name: category
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: List of tour packages
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/index.yaml#/TourPackageSummary'

/tour-packages/{id}:
  get:
    summary: Get tour package details
    operationId: getTourPackageById
    security: []
    x-middleware:
      auth: false
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Tour package details
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/TourPackageDetail'
      '404':
        description: Tour package not found

/tour-packages/book:
  post:
    summary: Book a tour package
    operationId: bookTourPackage
    security: []
    x-middleware:
      auth: false
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/index.yaml#/CreateTourPackageBookingRequest'
    responses:
      '201':
        description: Tour package booking created
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/CreateTourPackageBookingResponse'
      '400':
        description: Invalid request
      '404':
        description: Tour package not found