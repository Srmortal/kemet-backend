/tourism/bookings:
  post:
    summary: Create a new booking
    operationId: createTourismBooking
    security:
      - bearerAuth: []
    x-middleware:
      auth: true
      role: user
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/index.yaml#/CreateTourismBookingRequest'
    responses:
      '201':
        description: Booking created
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/TourismBooking'
      '400':
        description: Invalid request
  get:
    summary: Get bookings for authenticated user
    operationId: getTourismBookingsForUser
    security:
      - bearerAuth: []
    x-middleware:
      auth: true
      role: user
    responses:
      '200':
        description: List of user bookings
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/index.yaml#/TourismBooking'

/tourism:
  get:
    summary: Get all tourism places
    operationId: getAllTourismPlaces
    security: []
    x-middleware:
      auth: false
    parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      - name: filter
        in: query
        required: false
        schema:
          type: string
      - name: query
        in: query
        required: false
        schema:
          type: string
        description: Search term for tourism places
      - name: category
        in: query
        required: false
        schema:
          type: string
        description: Filter by category
      - name: location
        in: query
        required: false
        schema:
          type: string
        description: Filter by location
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
        description: Field to sort by (e.g., name, rating)
      - name: order
        in: query
        required: false
        schema:
          type: string
          enum: [asc, desc]
        description: Sort order (asc or desc)
    responses:
      '200':
        description: List of tourism places
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/GetTourismPlacesResponse'

/tourism/stats/overview:
  get:
    summary: Get tourism place statistics
    operationId: getTourismStatsOverview
    security: []
    x-middleware:
      auth: false
    responses:
      '200':
        description: Place statistics
        content:
          application/json:
            schema:
              type: object
              properties:
                totalPlaces:
                  type: integer
                totalCategories:
                  type: integer
              required:
                - totalPlaces
                - totalCategories

/tourism/locations/list:
  get:
    summary: Get available tourism locations
    operationId: getTourismLocationsList
    security: []
    x-middleware:
      auth: false
    responses:
      '200':
        description: List of locations
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  location:
                    type: string
                required:
                  - location

/tourism/categories/list:
  get:
    summary: Get available tourism categories
    operationId: getTourismCategoriesList
    security: []
    x-middleware:
      auth: false
    responses:
      '200':
        description: List of categories
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  category:
                    type: string
                required:
                  - category


/tourism/{id}:
  get:
    summary: Get tourism place by ID
    operationId: getTourismPlaceById
    security: []
    x-middleware:
      auth: false
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Tourism place details
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/TourismPlace'
      '404':
        description: Place not found