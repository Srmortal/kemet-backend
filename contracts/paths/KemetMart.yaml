/kemet-mart/products:
  get:
    summary: Get products
    operationId: getKemetMartProducts
    security:
      - bearerAuth: []
    x-middleware:
      auth: true
    responses:
      '200':
        description: Success
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/GetProductsResponse'
      '401':
        description: Unauthorized
      '403':
        description: Forbidden
/kemet-mart/cart:
  get:
    x-middleware:
      auth: true
    summary: Get cart
    operationId: getKemetMartCart
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Success
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/GetCartResponse'
      '401':
        description: Unauthorized
      '403':
        description: Forbidden
/kemet-mart/checkout:
  post:
    x-middleware:
      auth: true
    summary: Checkout
    operationId: kemetMartCheckout
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Success
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/CheckoutResponse'
      '401':
        description: Unauthorized
      '403':
        description: Forbidden
