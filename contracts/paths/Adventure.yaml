/adventures:
  parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
    - name: limit
      in: query
      required: false
      schema:
        type: integer
  get:
    summary: List all adventures
    operationId: listAdventures
    security: []
    x-middleware:
      auth: false
    responses:
      '200':
        description: List of adventures
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/index.yaml#/AdventureListItem'
/adventures/{id}:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
  get:
    summary: Get adventure by ID
    operationId: getAdventureById
    security: []
    x-middleware:
      auth: false
    responses:
      '200':
        description: Adventure details
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/AdventureListItem'
      '404':
        description: Adventure not found
/adventures/book:
  post:
    summary: Book an adventure
    operationId: bookAdventure
    security:
      - bearerAuth: []
    x-middleware:
      auth: true
      role: user
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/index.yaml#/CreateAdventureBookingRequest'
    responses:
      '201':
        description: Booking created
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/AdventureBooking'
      '400':
        description: Invalid request
/adventures/bookings:
  get:
    summary: Get user's adventure bookings
    operationId: getUserAdventureBookings
    security:
      - bearerAuth: []
    x-middleware:
      auth: true
      role: user
    responses:
      '200':
        description: List of user bookings
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas/index.yaml#/AdventureBookingListItem'