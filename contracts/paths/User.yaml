/auth/verify:
  post:
    summary: Verify user ID token
    operationId: verifyUserIdToken
    security: []
    x-middleware:
      auth: false
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/index.yaml#/VerifyUserIdTokenRequest'
    responses:
      '200':
        description: User verified
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/VerifyUserIdTokenResponse'
      '401':
        description: Unauthorized
      '409':
        description: Email already exists
      '500':
        description: Server error
/auth/logout:
  post:
    summary: Logout user
    operationId: logoutUser
    security:
      - bearerAuth: []
    x-middleware:
      auth: true
      role: user
    responses:
      '200':
        description: Logout successful
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/LogoutUserResponse'
/user/profile:
  get:
    summary: Get authenticated user profile
    operationId: getUserProfile
    security:
      - bearerAuth: []
    x-middleware:
      auth: true
      role: user
    responses:
      '200':
        description: User profile
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/ProfileDetailsDto'
      '401':
        description: Unauthorized