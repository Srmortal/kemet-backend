/guides:
  get:
    x-middleware:
      auth: true
    summary: Get a list of local guides
    description: Returns a paginated list of expert local guides with their details, credentials, languages, specializations, and tours.
    operationId: listGuides
    tags:
      - Guides
    parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
        description: Page number (default 1)
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
        description: Number of guides per page (default 20)
    responses:
      '200':
        description: Paginated list of guides
        content:
          application/json:
            schema:
              type: object
              properties:
                guides:
                  type: array
                  items:
                    $ref: '../components/schemas/Guide.yaml#/Guide'
                page:
                  type: integer
                  example: 1
                limit:
                  type: integer
                  example: 20
                total:
                  type: integer
                  example: 100
                totalPages:
                  type: integer
                  example: 5
      '500':
        description: Server error

/guides/{id}:
  get:
    x-middleware:
      auth: true
    summary: Get a specific guide by ID
    description: Returns detailed information about a specific local guide, including credentials, languages, specializations, and tours.
    operationId: getGuideById
    tags:
      - Guides
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: The unique identifier of the guide
    responses:
      '200':
        description: Guide details
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Guide.yaml#/Guide'
      '404':
        description: Guide not found
      '500':
        description: Server error
        
/guides/book:
  post:
    x-middleware:
      auth: true
    summary: Book a private guide
    description: Book a private guide for a specific date, time, and number of people.
    operationId: bookGuide
    tags:
      - Guides
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Guide.yaml#/CreateGuideBookingRequest'
    responses:
      '201':
        description: Guide booking confirmed
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Guide.yaml#/GuideBooking'
      '400':
        description: Invalid request
      '404':
        description: Guide not found
      '409':
        description: Guide not available for selected date/time
      '500':
        description: Server error