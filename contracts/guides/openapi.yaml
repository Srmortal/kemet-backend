openapi: 3.1.0
info:
  title: Guides
  description: ''
  version: 1.0.0
tags:
  - name: Guides
paths:
  /:
    get:
      summary: Get a list of local guides
      deprecated: false
      description: >-
        Returns a paginated list of expert local guides with their details,
        credentials, languages, specializations, and tours.
      operationId: listGuides
      tags:
        - Guides
      parameters:
        - name: page
          in: query
          description: Page number (default 1)
          required: false
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          description: Number of guides per page (default 20)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated list of guides
          content:
            application/json:
              schema:
                type: object
                properties:
                  guides:
                    type: array
                    items:
                      $ref: '#/components/schemas/Guide'
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  total:
                    type: integer
                    example: 100
                  totalPages:
                    type: integer
                    example: 5
          headers: {}
        '500':
          description: Server error
          headers: {}
      security:
        - bearerAuth: []
      x-middleware:
        auth: true
  /{id}:
    get:
      summary: Get a specific guide by ID
      deprecated: false
      description: >-
        Returns detailed information about a specific local guide, including
        credentials, languages, specializations, and tours.
      operationId: getGuideById
      tags:
        - Guides
      parameters:
        - name: id
          in: path
          description: The unique identifier of the guide
          required: true
          example: ''
          schema:
            type: string
      responses:
        '200':
          description: Guide details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guide'
          headers: {}
        '404':
          description: Guide not found
          headers: {}
        '500':
          description: Server error
          headers: {}
      security:
        - bearerAuth: []
      x-middleware:
        auth: true
  /{id}/book:
    post:
      summary: Book a private guide
      deprecated: false
      description: Book a private guide for a specific date, time, and number of people.
      operationId: bookGuide
      tags:
        - Guides
      parameters:
        - name: id
          in: path
          description: ''
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuideBookingRequest'
            examples: {}
        required: true
      responses:
        '201':
          description: Guide booking confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuideBooking'
          headers: {}
        '400':
          description: Invalid request
          headers: {}
        '404':
          description: Guide not found
          headers: {}
        '409':
          description: Guide not available for selected date/time
          headers: {}
        '500':
          description: Server error
          headers: {}
      security:
        - bearerAuth: []
      x-middleware:
        auth: true
components:
  schemas:
    Guide:
      type: object
      properties:
        id:
          type: string
          example: guide_1
        name:
          type: string
          example: Dr. Khaled Mostafa
        featured:
          type: boolean
          description: Whether the guide is featured
          example: true
        rating:
          type: number
          format: float
          example: 4.9
        reviews:
          type: integer
          example: 542
        toursCount:
          type: integer
          example: 1240
        pricePerDay:
          type: integer
          example: 1000
        pricePerHour:
          type: integer
          example: 150
        credentials:
          type: array
          items:
            type: string
          example:
            - Licensed Egyptologist
            - PhD
            - UNESCO Certified
            - First Aid Certified
        languages:
          type: array
          items:
            type: string
          example:
            - English
            - Arabic
            - French
            - German
        specializations:
          type: array
          items:
            type: string
          example:
            - Egyptology
            - Ancient History
            - Museums
        about:
          type: string
          example: >-
            Licensed Egyptologist with PhD in Ancient Egyptian History.
            Specialized in hieroglyphics and pharaonic dynasties. Published
            author and consultant for major museums.
        tours:
          type: array
          items:
            $ref: '#/components/schemas/Tour'
    Tour:
      type: object
      properties:
        name:
          type: string
          example: Pyramids of Giza Full Day Tour
        description:
          type: string
          example: A full day tour of the Pyramids of Giza.
        durationHours:
          type: integer
          example: 8
        maxPeople:
          type: integer
          example: 8
        price:
          type: integer
          example: 1200
    CreateGuideBookingRequest:
      type: object
      required:
        - date
        - startTime
        - hours
        - people
        - fullName
        - email
        - phone
      properties:
        date:
          type: string
          format: date
          description: Booking date (YYYY-MM-DD)
          example: '2026-01-31'
        startTime:
          type: string
          format: time
          description: Preferred start time (24h format, e.g. 09:00)
          example: '09:00'
        hours:
          type: integer
          description: Number of hours (full day = 8)
          example: 8
        people:
          type: integer
          description: Number of people
          example: 2
        fullName:
          type: string
          description: Full name of the contact person
          example: Ahmed Youssef
        email:
          type: string
          format: email
          description: Contact email
          example: ahmed@example.com
        phone:
          type: string
          pattern: ^\+?[1-9]\d{1,14}$
          description: Contact phone number
          example: '+201234567890'
    GuideBooking:
      type: object
      required:
        - bookingReference
        - guide
        - date
        - people
        - totalPaid
      properties:
        bookingReference:
          type: string
          description: Unique booking reference
          example: GUIDE-96608874
        guide:
          $ref: '#/components/schemas/Guide'
        date:
          type: string
          format: date
          description: Booking date (YYYY-MM-DD)
          example: '2026-01-31'
        people:
          type: integer
          description: Number of people
          example: 2
        totalPaid:
          type: integer
          description: Total amount paid in EGP
          example: 300
        paymentSummary:
          type: object
          properties:
            guideService:
              type: integer
              description: Amount paid for guide service
              example: 300
            total:
              type: integer
              description: Total paid
              example: 300
  responses: {}
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
servers: []
security:
  - bearerAuth: []
