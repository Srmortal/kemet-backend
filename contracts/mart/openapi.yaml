openapi: 3.1.0
info:
  title: mart
  description: ''
  version: 1.0.0
tags: []
paths:
  /cart:
    get:
      summary: Get cart
      deprecated: false
      description: ''
      operationId: getKemetMartCart
      tags: []
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCartResponse'
          headers: {}
        '401':
          description: Unauthorized
          headers: {}
        '403':
          description: Forbidden
          headers: {}
      security:
        - bearerAuth: []
      x-middleware:
        auth: true
  /checkout:
    post:
      summary: Checkout
      deprecated: false
      description: ''
      operationId: kemetMartCheckout
      tags: []
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
          headers: {}
        '401':
          description: Unauthorized
          headers: {}
        '403':
          description: Forbidden
          headers: {}
      security:
        - bearerAuth: []
      x-middleware:
        auth: true
  /:
    get:
      summary: Get products
      deprecated: false
      description: ''
      operationId: getKemetMartProducts
      tags: []
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductsResponse'
          headers: {}
        '401':
          description: Unauthorized
          headers: {}
        '403':
          description: Forbidden
          headers: {}
      security:
        - bearerAuth: []
      x-middleware:
        auth: true
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        price:
          type: number
        currency:
          type: string
        rating:
          type: number
        image:
          type: string
        isBestseller:
          type: boolean
        isPremium:
          type: boolean
        discountPercent:
          type: number
        oldPrice:
          type: number
    CartItem:
      type: object
      properties:
        productId:
          type: string
    GetCartResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        total:
          type: number
    CheckoutResponse:
      type: object
      properties:
        orderId:
          type: string
        total:
          type: number
    GetProductsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
          required:
            - page
            - limit
            - total
      required:
        - data
        - pagination
  responses: {}
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
servers: []
security:
  - bearerAuth: []
