VerifyUserIdTokenRequest:
  type: object
  properties:
    fullName:
      type: string
    passportNumber:
      type: string
      pattern: '^[A-PR-WYa-pr-wy][1-9]\d\s?\d{4}[1-9]$'
    nationality:
      type: string
      maxLength: 3
    dateOfBirth:
      type: string
      format: date
    gender:
      type: string
      enum: [M, F]
    expiryDate:
      type: string
      format: date
  required:
    - fullName
    - passportNumber
    - nationality
    - dateOfBirth
    - gender
    - expiryDate
VerifyUserIdTokenResponse:
  type: object
  properties:
    userId:
      type: string
    email:
      type: string
      format: email
  required:
    - userId
    - email
LogoutUserResponse:
  type: object
  properties:
    status:
      type: string
  required:
    - status
CreateUserRequest:
  type: object
  properties:
    email:
      type: string
      format: email
    password:
      type: string
    displayName:
      type: string
    emailVerified:
      type: boolean
  required:
    - email
CreateUserResponse:
  type: object
  properties:
    uid:
      type: string
    email:
      type: string
    displayName:
      type: string
    emailVerified:
      type: boolean
  required:
    - uid
User:
  type: object
  properties:
    uid:
      type: string
    email:
      type: string
      format: email
    emailVerified:
      type: boolean
    displayName:
      type: string
    photoURL:
      type: string
      format: uri
    disabled:
      type: boolean
    metadata:
      type: object
      properties:
        creationTime:
          type: string
          format: date-time
        lastSignInTime:
          type: string
          format: date-time

# DTO for user profile details
ProfileDetailsDto:
  type: object
  properties:
    firstName:
      type: string
    lastName:
      type: string
    bio:
      type: string
    phoneNumber:
      type: string
    countryName:
      type: string
    email:
      type: string
      format: email
    dob:
      type: string
      format: date
    bookingsCount:
      type: integer
    favouritesCount:
      type: integer
  required:
    - firstName
    - lastName
    - email
    - bookingsCount
    - favouritesCount