Guide:
  type: object
  properties:
    id:
      type: string
      example: "guide_1"
    name:
      type: string
      example: "Dr. Khaled Mostafa"
    featured:
      type: boolean
      description: Whether the guide is featured
      example: true
    rating:
      type: number
      format: float
      example: 4.9
    reviews:
      type: integer
      example: 542
    toursCount:
      type: integer
      example: 1240
    pricePerDay:
      type: integer
      example: 1000
    pricePerHour:
      type: integer
      example: 150
    credentials:
      type: array
      items:
        type: string
      example: ["Licensed Egyptologist", "PhD", "UNESCO Certified", "First Aid Certified"]
    languages:
      type: array
      items:
        type: string
      example: ["English", "Arabic", "French", "German"]
    specializations:
      type: array
      items:
        type: string
      example: ["Egyptology", "Ancient History", "Museums"]
    about:
      type: string
      example: "Licensed Egyptologist with PhD in Ancient Egyptian History. Specialized in hieroglyphics and pharaonic dynasties. Published author and consultant for major museums."
    tours:
      type: array
      items:
        $ref: '#/Tour'

CreateGuideBookingRequest:
  type: object
  required:
    - guideId
    - date
    - startTime
    - hours
    - people
    - fullName
    - email
    - phone
  properties:
    guideId:
      type: string
      description: The ID of the guide to book
      example: "guide_1"
    date:
      type: string
      format: date
      description: Booking date (YYYY-MM-DD)
      example: "2026-01-31"
    startTime:
      type: string
      format: time
      description: Preferred start time (24h format, e.g. 09:00)
      example: "09:00"
    hours:
      type: integer
      description: Number of hours (full day = 8)
      example: 8
    people:
      type: integer
      description: Number of people
      example: 2
    fullName:
      type: string
      description: Full name of the contact person
      example: "Ahmed Youssef"
    email:
      type: string
      format: email
      description: Contact email
      example: "ahmed@example.com"
    phone:
      type: string
      pattern: '^\+?[1-9]\d{1,14}$'
      description: Contact phone number
      example: "+201234567890"

GuideBooking:
  type: object
  required:
    - bookingReference
    - guide
    - date
    - people
    - totalPaid
  properties:
    bookingReference:
      type: string
      description: Unique booking reference
      example: "GUIDE-96608874"
    guide:
      $ref: './Guide.yaml#/Guide'
    date:
      type: string
      format: date
      description: Booking date (YYYY-MM-DD)
      example: "2026-01-31"
    people:
      type: integer
      description: Number of people
      example: 2
    totalPaid:
      type: integer
      description: Total amount paid in EGP
      example: 300
    paymentSummary:
      type: object
      properties:
        guideService:
          type: integer
          description: Amount paid for guide service
          example: 300
        total:
          type: integer
          description: Total paid
          example: 300

Tour:
  type: object
  properties:
    name:
      type: string
      example: "Pyramids of Giza Full Day Tour"
    description:
      type: string
      example: "A full day tour of the Pyramids of Giza."
    durationHours:
      type: integer
      example: 8
    maxPeople:
      type: integer
      example: 8
    price:
      type: integer
      example: 1200
