Product:
  type: object
  properties:
    id:
      type: integer
    name:
      type: string
    category:
      type: string
    price:
      type: number
    currency:
      type: string
    rating:
      type: number
    image:
      type: string
    isBestseller:
      type: boolean
    isPremium:
      type: boolean
    discountPercent:
      type: number
    oldPrice:
      type: number
CartItem:
  type: object
  properties:
    productId:
      type: string
GetCartResponse:
  type: object
  properties:
    items:
      type: array
      items:
        $ref: '#/CartItem'
    total:
      type: number
CheckoutResponse:
  type: object
  properties:
    orderId:
      type: string
    total:
      type: number
GetProductsResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: '#/Product'
    pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
      required:
        - page
        - limit
        - total
  required:
    - data
    - pagination